<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>жіЁеҶҢйЎөйқў</title>
    <script src="../javascript/hash.js"></script>
</head>
<body>
<form id="registerForm">
    <label for="name">з”ЁжҲ·еҗҚ:</label>
    <input type="text" id="name" name="name" required/>
    <label for="password">еҜҶз Ғ:</label>
    <input type="password" id="password" name="password" required/>
</form>
<button onclick="register()">жіЁеҶҢ</button>

</body>
<script>
    async function register() {
        const formData = new FormData(document.getElementById('registerForm'));
        const name = formData.get('name');
        console.log(`name=${name}`);
        const password = formData.get('password');
        console.log(`password=${password}`);
        // const passwordHash = await sha256(password);
        const passwordHash = password;
        console.log(`passwordHash=${passwordHash}`);
        const newFormData = new FormData();
        newFormData.append('name', name);
        newFormData.append('password', passwordHash);
        fetch('http://localhost:7443/api/users/create', {
            method: 'POST',
            body: newFormData
        })
            .then(response => response.json())
            .then(result => {
                if (result.resultcode === 200) {
                    alert('жіЁеҶҢжҲҗеҠҹ')
                } else {
                    alert('жіЁеҶҢеӨұиҙҘ')
                    console.log('жіЁеҶҢеӨұиҙҘ');
                }
            })
    }
</script>
</html>
